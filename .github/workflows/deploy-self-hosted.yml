name: Deploy To Mini PC

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_type:
        description: "Choose deployment mode"
        required: true
        default: "deploy"
        type: choice
        options:
          - deploy
          - restart
      branch:
        description: "Git branch to deploy"
        required: true
        default: "main"
        type: string
      api_base_url:
        description: "Production API base URL"
        required: true
        default: "https://api.hsft.io.kr/api"
        type: string
      port:
        description: "Port for mobile web"
        required: true
        default: "4173"
        type: string

jobs:
  deploy:
    runs-on:
      - self-hosted
      - windows
      - attendance-prod

    steps:
      - name: Show deployment target
        shell: powershell
        run: |
          Write-Host "Deploy type: ${{ github.event.inputs.deploy_type || 'deploy' }}"
          Write-Host "Branch: ${{ github.event.inputs.branch || 'main' }}"
          Write-Host "API base URL: ${{ github.event.inputs.api_base_url || 'https://api.hsft.io.kr/api' }}"
          Write-Host "Port: ${{ github.event.inputs.port || '4173' }}"
          Write-Host "Target path: C:\attendance-app\mobile"

      - name: Run full deployment
        if: ${{ github.event_name == 'push' || github.event.inputs.deploy_type == 'deploy' }}
        shell: powershell
        run: |
          Set-Location "C:\attendance-app\mobile"
          powershell -ExecutionPolicy Bypass -File ".\scripts\deploy-prod.ps1" -Branch "${{ github.event.inputs.branch || 'main' }}" -ApiBaseUrl "${{ github.event.inputs.api_base_url || 'https://api.hsft.io.kr/api' }}" -Port "${{ github.event.inputs.port || '4173' }}"

      - name: Run restart only
        if: ${{ github.event.inputs.deploy_type == 'restart' }}
        shell: powershell
        run: |
          Set-Location "C:\attendance-app\mobile"
          powershell -ExecutionPolicy Bypass -File ".\scripts\restart-prod.ps1"
